<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    
    <title>Blom | System & Appar</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400..700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        main: '#0a0f1a',
                        header: '#0f172a',
                        card: '#161d2b',
                        accent: '#e58e26',
                        border_subtle: '#1e293b'
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0f1a; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #e58e26; }

        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
        }

        #terminal-overlay {
            transform: translateY(-100%);
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #terminal-overlay.open {
            transform: translateY(0);
        }
    </style>
</head>
<body class="bg-main text-slate-100 font-sans antialiased min-h-screen selection:bg-accent selection:text-main overflow-x-hidden flex flex-col">

    <div id="boot-sequence" class="fixed inset-0 z-[9999] bg-main flex flex-col justify-center items-start p-10 md:p-24 font-mono text-sm sm:text-base pointer-events-auto transition-opacity duration-1000">
        <div id="boot-text" class="text-green-500 space-y-2"></div>
    </div>

    <header class="fixed top-0 left-0 right-0 z-50 bg-header/80 backdrop-blur-md border-b border-border_subtle">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-3 cursor-pointer">
                <i data-lucide="cpu" class="w-6 h-6 text-accent"></i>
                <h1 class="text-xl font-black uppercase italic tracking-tighter">Blom<span class="text-accent">.AI</span></h1>
            </a>
            <nav class="hidden md:flex gap-8">
                <a href="index.html" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-accent transition-colors flex items-center gap-2 outline-none">
                    <i data-lucide="user" class="w-3 h-3"></i> Profil
                </a>
                <a href="index.html?view=portfolio" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-accent transition-colors flex items-center gap-2 outline-none">
                    <i data-lucide="image" class="w-3 h-3"></i> Kreationer
                </a>
                <button class="text-[10px] font-black uppercase tracking-widest text-accent flex items-center gap-2 outline-none cursor-default">
                    <i data-lucide="layout-grid" class="w-3 h-3"></i> App-Valv
                </button>
                <a href="index.html?view=private" class="text-[10px] font-black uppercase tracking-widest text-slate-400 hover:text-accent transition-colors flex items-center gap-2 outline-none">
                    <i data-lucide="lock" class="w-3 h-3"></i> Privat Valv
                </a>
            </nav>
            <button class="md:hidden text-slate-400 hover:text-accent outline-none">
                <i data-lucide="menu" class="w-6 h-6"></i>
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pt-32 pb-24 flex-1 w-full">
        
        <div class="flex flex-col lg:flex-row lg:items-end justify-between gap-6 border-b border-border_subtle pb-6 reveal active">
            <div>
                <h2 class="text-4xl font-black uppercase italic tracking-tighter flex items-center gap-4">
                    <i data-lucide="layout-grid" class="w-8 h-8 text-accent"></i>
                    Databas: Appar & System
                </h2>
                <p class="text-slate-500 text-sm mt-2 font-mono">Bibliotek med egenutvecklade digitala verktyg och arkitektur.</p>
            </div>
            
            <div class="flex flex-col md:flex-row items-start md:items-center gap-4 w-full lg:w-auto">
                <button onclick="openAppModal()" class="px-5 py-2 rounded-xl bg-accent/10 border border-accent text-[10px] font-black uppercase tracking-widest text-accent hover:bg-accent hover:text-main transition-all flex items-center gap-2 shrink-0">
                    <i data-lucide="plus" class="w-4 h-4"></i> Lägg till Modul
                </button>
                <div class="relative w-full md:w-64">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                    <input type="text" id="app-search-input" oninput="renderApps()" placeholder="Sök app-namn eller funktion..." class="w-full bg-main border border-border_subtle rounded-xl py-2 pl-9 pr-4 text-xs font-mono text-slate-200 focus:border-accent outline-none transition-colors placeholder:text-slate-600 shadow-inner">
                </div>
            </div>
        </div>

        <div id="apps-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-8">
            <!-- Appar genereras här -->
        </div>

    </main>

    <footer class="border-t border-border_subtle bg-header py-12 mt-auto">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center opacity-50">
            <div class="flex items-center gap-3">
                <i data-lucide="cpu" class="w-5 h-5"></i>
                <span class="text-sm font-black uppercase italic tracking-tighter">Blom.AI © 2026</span>
            </div>
            <button onclick="toggleTerminal()" class="text-[10px] font-black uppercase tracking-widest text-slate-500 hover:text-accent transition-colors flex items-center gap-2">
                <i data-lucide="terminal-square" class="w-4 h-4"></i> [SYS]
            </button>
        </div>
    </footer>

    <!-- Modal: Lägg till App/Modul -->
    <div id="add-app-modal" class="fixed inset-0 z-[300] bg-main/95 backdrop-blur-xl flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 p-4 overflow-y-auto">
        <div class="bg-card w-full max-w-2xl rounded-[2rem] border border-border_subtle p-6 md:p-8 shadow-2xl relative my-auto">
            <button onclick="closeAppModal()" class="absolute top-6 right-6 text-slate-400 hover:text-accent transition-colors"><i data-lucide="x" class="w-6 h-6"></i></button>
            <h3 class="text-2xl font-black text-white italic mb-6">Lägg till ny App / Modul</h3>
            <div class="space-y-4">
                <div class="flex flex-col md:flex-row gap-4">
                    <div class="w-full md:w-1/3">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-1">ID (T.ex. app-128)</label>
                        <input type="text" id="add-a-id" class="w-full bg-main border border-border_subtle rounded-xl p-3 text-slate-200 outline-none focus:border-accent" placeholder="app-xxx">
                    </div>
                    <div class="w-full md:w-2/3">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-1">Titel</label>
                        <input type="text" id="add-a-title" class="w-full bg-main border border-border_subtle rounded-xl p-3 text-slate-200 outline-none focus:border-accent" placeholder="Systemets namn">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-1">Bildlänk (Imgur URL - Valfritt)</label>
                    <input type="text" id="add-a-image" class="w-full bg-main border border-border_subtle rounded-xl p-3 text-slate-200 outline-none focus:border-accent" placeholder="https://i.imgur.com/...">
                </div>
                <div class="flex flex-col md:flex-row gap-4">
                    <div class="w-full md:w-1/2">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-1">Kort Beskrivning</label>
                        <input type="text" id="add-a-short" class="w-full bg-main border border-border_subtle rounded-xl p-3 text-slate-200 outline-none focus:border-accent" placeholder="En snabb summering...">
                    </div>
                    <div class="w-full md:w-1/2">
                        <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-1">Taggar (Kommaseparerade)</label>
                        <input type="text" id="add-a-tags" class="w-full bg-main border border-border_subtle rounded-xl p-3 text-slate-200 outline-none focus:border-accent" placeholder="React, Firebase, 3D...">
                    </div>
                </div>
                <div>
                    <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest block mb-1">Fullständig Dokumentation</label>
                    <textarea id="add-a-full" rows="6" class="w-full bg-main border border-border_subtle rounded-xl p-3 text-slate-200 outline-none focus:border-accent" placeholder="Den detaljerade arkitekturen..."></textarea>
                </div>
            </div>
            <div class="mt-8">
                <button onclick="saveApp()" class="w-full px-6 py-3 rounded-xl bg-accent text-main font-black uppercase tracking-widest hover:bg-white transition-colors shadow-lg">Spara Modul i Valvet</button>
            </div>
        </div>
    </div>

    <!-- Info/Project Modal -->
    <div id="info-modal" class="fixed inset-0 z-[100] bg-main/95 backdrop-blur-xl flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 p-4 md:p-6 overflow-y-auto">
        <button onclick="closeInfoModal()" class="fixed top-4 right-4 md:top-6 md:right-6 w-10 h-10 md:w-12 md:h-12 flex items-center justify-center rounded-2xl bg-card border border-border_subtle text-slate-400 hover:text-accent hover:border-accent transition-all z-[110]">
            <i data-lucide="x" class="w-5 h-5 md:w-6 md:h-6"></i>
        </button>
        <div class="max-w-4xl w-full my-auto flex flex-col justify-center relative pt-12 md:pt-0" id="modal-content"></div>
    </div>

    <!-- Terminal Overlay -->
    <div id="terminal-overlay" class="fixed top-0 left-0 right-0 h-[60vh] z-[200] bg-main/95 backdrop-blur-xl border-b border-accent/30 shadow-2xl shadow-accent/5 font-mono text-sm flex flex-col">
        <div class="h-10 bg-header border-b border-border_subtle flex items-center justify-between px-4">
            <span class="text-[10px] font-black uppercase tracking-widest text-accent flex items-center gap-2">
                <i data-lucide="terminal" class="w-3 h-3"></i> N.E.X.U.S. Command Line
            </span>
            <div class="flex items-center gap-4">
                <input type="file" id="import-file" class="hidden" accept=".json" onchange="importData(event)">
                <button onclick="exportData()" class="text-[10px] font-black uppercase tracking-widest text-amber-500 hover:text-white transition flex items-center gap-1" title="Exportera JSON"><i data-lucide="download" class="w-3 h-3"></i> Export</button>
                <button onclick="document.getElementById('import-file').click()" class="text-[10px] font-black uppercase tracking-widest text-emerald-400 hover:text-white transition flex items-center gap-1" title="Importera JSON"><i data-lucide="upload" class="w-3 h-3"></i> Import</button>
                <div class="w-px h-4 bg-slate-700 mx-2"></div>
                <button onclick="toggleTerminal()" class="text-slate-500 hover:text-white"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
        </div>
        <div id="terminal-output" class="flex-1 p-4 overflow-y-auto text-slate-300 space-y-2">
            <div class="text-accent">Welcome to Blom.AI Terminal. Type '/help' for a list of commands.</div>
        </div>
        <div class="h-12 border-t border-border_subtle flex items-center px-4 gap-2 bg-main">
            <span class="text-accent">root@blom:~#</span>
            <input type="text" id="terminal-input" class="flex-1 bg-transparent border-none outline-none text-slate-100 placeholder-slate-700 font-mono" placeholder="Enter command..." autocomplete="off">
        </div>
    </div>

    <script>
        const itemsPerPage = 10;
        let currentAppDisplayCount = itemsPerPage;

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        window.handleImageError = function(imgElement, type) {
            const div = document.createElement('div');
            if (type === 'grid' || type === 'thumb' || type === 'main' || type === 'light') {
                div.className = 'w-full h-full flex flex-col items-center justify-center bg-card border border-border_subtle text-slate-600 text-[10px] uppercase tracking-widest';
                div.innerHTML = '<i data-lucide="image-off" class="w-8 h-8 mb-2 opacity-50"></i>Källfil Offline';
            } else if (type === 'hide') {
                imgElement.parentElement.style.display = 'none'; return;
            }
            imgElement.replaceWith(div);
            lucide.createIcons();
        };

        // ==========================================
        // 1. DATA LADDAS DYNAMISKT FRÅN MINNET
        // ==========================================
        let appData = [];
        try { 
            let saved = localStorage.getItem('blom_app_data');
            if(saved) appData = JSON.parse(saved);
        } catch(e){}

        // För statistiken
        let portfolioData = [];
        try { 
            let savedPort = localStorage.getItem('blom_portfolio_data');
            if(savedPort) portfolioData = JSON.parse(savedPort);
        } catch(e){}

        // ==========================================
        // NYA INMATNINGSFUNKTIONER
        // ==========================================
        function openAppModal() { document.getElementById('add-app-modal').classList.remove('opacity-0', 'pointer-events-none'); document.body.style.overflow = 'hidden'; }
        function closeAppModal() { document.getElementById('add-app-modal').classList.add('opacity-0', 'pointer-events-none'); document.body.style.overflow = ''; }

        function saveApp() {
            const id = document.getElementById('add-a-id').value.trim() || ('app-' + Date.now().toString(36));
            const title = document.getElementById('add-a-title').value.trim();
            const image = document.getElementById('add-a-image').value.trim();
            const shortDesc = document.getElementById('add-a-short').value.trim();
            const tagsRaw = document.getElementById('add-a-tags').value.trim();
            const fullDesc = document.getElementById('add-a-full').value.trim();

            if(!title) { alert('Titel saknas!'); return; }

            const tagsArray = tagsRaw ? tagsRaw.split(',').map(s => s.trim()) : [];

            const newApp = {
                id: id,
                title: title,
                image: image,
                shortDesc: shortDesc,
                icon: 'cpu', 
                tags: tagsArray,
                fullDesc: fullDesc
            };

            appData.unshift(newApp);
            localStorage.setItem('blom_app_data', JSON.stringify(appData));
            
            currentAppDisplayCount = itemsPerPage;
            renderApps();
            
            closeAppModal();

            document.getElementById('add-a-id').value = '';
            document.getElementById('add-a-title').value = '';
            document.getElementById('add-a-image').value = '';
            document.getElementById('add-a-short').value = '';
            document.getElementById('add-a-tags').value = '';
            document.getElementById('add-a-full').value = '';
        }

        // ==========================================
        // 3.5 RENDER MOTOR APPAR (MED PAGINERING)
        // ==========================================
        function loadMoreApps() {
            currentAppDisplayCount += itemsPerPage;
            renderApps();
        }

        function renderApps() {
            const appsGrid = document.getElementById('apps-grid');
            if (!appsGrid) return; 
            appsGrid.innerHTML = '';
            
            const searchVal = document.getElementById('app-search-input').value.toLowerCase().trim();

            const filteredApps = appData.filter(app => {
                const text = `${app.title} ${app.shortDesc} ${app.fullDesc} ${app.tags.join(' ')}`.toLowerCase();
                return !searchVal || text.includes(searchVal);
            });

            if (filteredApps.length === 0) {
                appsGrid.innerHTML = `<div class="col-span-full text-center py-12 text-slate-500 font-mono text-sm">Inga appar hittades. Ladda in via [SYS] Terminal.</div>`;
                return;
            }

            // Shuffle apps before slicing
            const shuffledApps = shuffleArray([...filteredApps]);
            const dataToShow = shuffledApps.slice(0, currentAppDisplayCount);

            dataToShow.forEach(app => {
                const tagBadges = app.tags.map(t => `<span class="px-2 py-1 bg-main border border-border_subtle rounded-md text-[8px] text-slate-400 uppercase tracking-widest font-black">${t}</span>`).join('');
                
                const imageHtml = app.image ? `
                    <div class="w-full h-40 mb-4 rounded-xl overflow-hidden border border-border_subtle flex-shrink-0 relative group-hover:border-accent/50 transition-colors">
                        <img src="${app.image}" alt="${app.title}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" onerror="handleImageError(this, 'hide')">
                    </div>
                ` : '';

                const card = document.createElement('div');
                card.className = 'bg-card border border-border_subtle p-6 rounded-3xl hover:border-accent transition-colors flex flex-col h-full reveal active cursor-pointer group';
                card.onclick = () => openInfoModal(app.id);
                card.innerHTML = `
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-10 h-10 rounded-xl bg-accent/10 border border-accent flex items-center justify-center shrink-0 group-hover:bg-accent/20 transition-colors">
                            <i data-lucide="${app.icon || 'cpu'}" class="w-5 h-5 text-accent"></i>
                        </div>
                        <h3 class="text-lg font-black uppercase italic tracking-tighter text-white group-hover:text-accent transition-colors">${app.title}</h3>
                    </div>
                    ${imageHtml}
                    <p class="text-slate-400 text-sm flex-1 mb-6">${app.shortDesc}</p>
                    <div class="flex flex-wrap gap-2 mb-6">${tagBadges}</div>
                    <button class="w-full py-3 rounded-xl bg-main border border-border_subtle text-[10px] font-black uppercase tracking-widest text-slate-300 group-hover:border-accent group-hover:text-accent transition-colors mt-auto">Läs Dokumentation</button>
                `;
                appsGrid.appendChild(card);
            });

            if (currentAppDisplayCount < filteredApps.length) {
                const btnContainer = document.createElement('div');
                btnContainer.className = 'col-span-full flex justify-center mt-6 mb-4';
                btnContainer.innerHTML = `
                    <button onclick="loadMoreApps()" class="px-8 py-3 rounded-xl bg-card border border-border_subtle text-[12px] font-black uppercase tracking-widest text-slate-300 hover:border-accent hover:text-accent transition-all flex items-center gap-3 shadow-lg">
                        <i data-lucide="chevron-down" class="w-5 h-5"></i> Visa fler
                    </button>
                `;
                appsGrid.appendChild(btnContainer);
            }

            lucide.createIcons();
            setupObservers();
        }

        // ==========================================
        // 4. MODAL LOGIK
        // ==========================================
        function openInfoModal(appId) {
            const app = appData.find(a => a.id === appId);
            if (!app) return;

            const content = document.getElementById('modal-content');
            
            const imageHtml = app.image ? `
                <img src="${app.image}" class="w-full aspect-video object-cover rounded-t-[3rem] border-b border-border_subtle" onerror="handleImageError(this, 'main')">
            ` : '';

            content.innerHTML = `
                <div class="bg-card rounded-[3rem] border border-border_subtle shadow-2xl w-full relative overflow-hidden flex flex-col">
                    <div class="absolute top-0 left-0 w-full h-1 bg-accent z-20"></div>
                    ${imageHtml}
                    <div class="p-8 md:p-14">
                        <div class="flex items-center gap-4 mb-6">
                            <div class="w-10 h-10 md:w-12 md:h-12 rounded-2xl bg-main border border-border_subtle flex items-center justify-center shrink-0">
                                <i data-lucide="${app.icon || 'cpu'}" class="w-5 h-5 md:w-6 md:h-6 text-accent"></i>
                            </div>
                            <h3 class="text-2xl md:text-3xl font-black uppercase italic tracking-tighter text-slate-100">${app.title}</h3>
                        </div>
                        <div class="flex flex-wrap gap-2 mb-6">
                            ${(app.tags || []).map(tag => `<span class="px-3 py-1 bg-main border border-border_subtle rounded-lg text-[10px] text-slate-400 uppercase tracking-widest font-black">${tag}</span>`).join('')}
                        </div>
                        <p class="text-slate-400 leading-relaxed text-base md:text-lg whitespace-pre-wrap">${app.fullDesc}</p>
                    </div>
                </div>
            `;
            showModal('info-modal');
        }

        function showModal(id) { document.getElementById(id).classList.remove('opacity-0', 'pointer-events-none'); document.body.style.overflow = 'hidden'; lucide.createIcons(); }
        function closeInfoModal() { document.getElementById('info-modal').classList.add('opacity-0', 'pointer-events-none'); document.body.style.overflow = ''; setTimeout(() => { document.getElementById('modal-content').innerHTML = ''; }, 300); }

        function setupObservers() {
            const observer = new IntersectionObserver((entries) => { entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); }); }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        }

        // ==========================================
        // 5. TERMINAL & SMART MERGE IMPORT
        // ==========================================
        const terminalOverlay = document.getElementById('terminal-overlay');
        const terminalInput = document.getElementById('terminal-input');
        const terminalOutput = document.getElementById('terminal-output');

        function toggleTerminal() {
            if (terminalOverlay.classList.contains('open')) { terminalOverlay.classList.remove('open'); terminalInput.blur(); } 
            else { terminalOverlay.classList.add('open'); setTimeout(() => terminalInput.focus(), 500); }
        }

        document.addEventListener('keydown', (e) => { if (e.key === '`' || e.key === '~' || (e.key === 'Escape' && terminalOverlay.classList.contains('open'))) { e.preventDefault(); toggleTerminal(); } });

        terminalInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                const val = terminalInput.value.trim();
                if (!val) return;
                printTerminal(`<span class="text-slate-500">root@blom:~#</span> ${val}`);
                terminalInput.value = '';

                const cmd = val.toLowerCase();
                if (cmd === '/help') {
                    printTerminal(`Available commands:<br>  <span class="text-accent">/help</span> - Show this message<br>  <span class="text-accent">/export</span> - Export JSON backup<br>  <span class="text-accent">/import</span> - Import JSON backup<br>  <span class="text-accent">/stats</span> - Show system statistics<br>  <span class="text-accent">/clear</span> - Clear terminal<br>  <span class="text-accent">/exit</span> - Close terminal`);
                } else if (cmd === '/export') {
                    exportData();
                } else if (cmd === '/import') {
                    document.getElementById('import-file').click();
                } else if (cmd === '/stats') {
                    const currentPortfolio = typeof portfolioData !== 'undefined' ? portfolioData.length : JSON.parse(localStorage.getItem('blom_portfolio_data') || '[]').length;
                    const currentApps = typeof appData !== 'undefined' ? appData.length : JSON.parse(localStorage.getItem('blom_app_data') || '[]').length;
                    printTerminal(`System Status:<br>- Database entries: ${currentPortfolio}<br>- App entries: ${currentApps}<br>- Memory optimized: True`);
                } else if (cmd === '/clear') {
                    terminalOutput.innerHTML = '';
                } else if (cmd === '/exit') {
                    toggleTerminal();
                } else {
                    printTerminal(`Command not found: ${val}. Type '/help' for available commands.`);
                }
            }
        });

        function printTerminal(htmlString) {
            const div = document.createElement('div');
            div.innerHTML = htmlString;
            terminalOutput.appendChild(div);
            terminalOutput.scrollTop = terminalOutput.scrollHeight;
        }

        function exportData() {
            try {
                const currentPortfolio = JSON.parse(localStorage.getItem('blom_portfolio_data') || '[]');
                const currentApps = typeof appData !== 'undefined' && appData.length > 0 ? appData : JSON.parse(localStorage.getItem('blom_app_data') || '[]');
                const currentPrivate = JSON.parse(localStorage.getItem('blom_private_data') || '[]');

                const dataToExport = {
                    portfolio: currentPortfolio,
                    apps: currentApps,
                    private: currentPrivate 
                };
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(dataToExport, null, 2));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", "blom_master_vault_" + new Date().toISOString().slice(0,10) + ".json");
                document.body.appendChild(downloadAnchorNode); 
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
                printTerminal(`<span class="text-emerald-400">System backup exported successfully.</span>`);
            } catch(e) {
                printTerminal(`<span class="text-red-500">ERROR: Export failed.</span>`);
            }
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    let importedSomething = false;
                    
                    let currentPortfolio = JSON.parse(localStorage.getItem('blom_portfolio_data') || '[]');
                    let currentApps = JSON.parse(localStorage.getItem('blom_app_data') || '[]');
                    if (typeof appData !== 'undefined' && appData.length > 0) {
                        currentApps = appData;
                    }
                    
                    let importPortfolio = [];
                    let importApps = [];

                    if (Array.isArray(importedData)) {
                        importPortfolio = importedData;
                    } else {
                        if (importedData.portfolio && Array.isArray(importedData.portfolio)) importPortfolio = importedData.portfolio;
                        if (importedData.apps && Array.isArray(importedData.apps)) importApps = importedData.apps;
                        if (importedData.private && Array.isArray(importedData.private)) {
                            localStorage.setItem('blom_private_data', JSON.stringify(importedData.private));
                            importedSomething = true;
                        }
                    }

                    // SMART MERGE PORTFOLIO
                    if (importPortfolio.length > 0) {
                        const mergedPortfolio = [...currentPortfolio];
                        importPortfolio.forEach(impItem => {
                            if (!mergedPortfolio.find(existing => existing.id === impItem.id || existing.mediaUrl === impItem.mediaUrl)) {
                                mergedPortfolio.push(impItem);
                            }
                        });
                        localStorage.setItem('blom_portfolio_data', JSON.stringify(mergedPortfolio));
                        importedSomething = true;
                    }

                    // SMART MERGE APPS
                    if (importApps.length > 0) {
                        const mergedApps = [...currentApps];
                        importApps.forEach(impApp => {
                            const existingIndex = mergedApps.findIndex(a => a.id === impApp.id || a.title === impApp.title);
                            if (existingIndex >= 0) {
                                const existingLength = (mergedApps[existingIndex].fullDesc || '').length;
                                const importedLength = (impApp.fullDesc || '').length;
                                if (importedLength > existingLength) {
                                    mergedApps[existingIndex] = impApp; 
                                }
                            } else {
                                mergedApps.push(impApp); 
                            }
                        });
                        localStorage.setItem('blom_app_data', JSON.stringify(mergedApps));
                        importedSomething = true;
                    }
                    
                    if(importedSomething) {
                        printTerminal(`<span class="text-emerald-400">Smart Merge Successful: Vault synchronized. Reloading OS...</span>`);
                        setTimeout(() => location.reload(), 1500);
                    } else {
                        throw new Error("Missing portfolio or apps arrays in JSON.");
                    }
                } catch (err) {
                    printTerminal(`<span class="text-red-500">ERROR: Invalid JSON file structure.</span>`);
                    alert("Fel vid import av JSON. Kontrollera filstrukturen.");
                }
            };
            reader.readAsText(file);
            event.target.value = ''; 
        }

        // ==========================================
        // DYNAMISK FETCH AV DATABASE.JSON
        // ==========================================
        async function fetchDatabase() {
            try {
                const response = await fetch('database.json');
                if (!response.ok) throw new Error('Database not found locally.');
                
                const data = await response.json();
                let loadedSomething = false;
                
                if (data.portfolio && Array.isArray(data.portfolio)) {
                    localStorage.setItem('blom_portfolio_data', JSON.stringify(data.portfolio));
                    loadedSomething = true;
                }
                if (data.apps && Array.isArray(data.apps)) {
                    appData = data.apps;
                    localStorage.setItem('blom_app_data', JSON.stringify(appData));
                    loadedSomething = true;
                }
                if (data.private && Array.isArray(data.private)) {
                    localStorage.setItem('blom_private_data', JSON.stringify(data.private));
                }
                
                if(loadedSomething) {
                    console.log("Databas laddades över nätverket (publik åtkomst)");
                }
            } catch (error) {
                console.warn("Laddade inte från database.json. Använder webbläsarens lokala minne istället.", error);
            }
        }

        // ==========================================
        // 8. BOOT SEQUENCE
        // ==========================================
        function runBootSequence() {
            const bootOverlay = document.getElementById('boot-sequence');
            const bootText = document.getElementById('boot-text');
            const bootLines = ["Initiating Blom OS App Vault...", "Mounting App File System...", "Authenticating architect 'Blom'...", "Access Granted. Loading User Interface..."];
            let lineIndex = 0;
            document.body.style.overflow = 'hidden';

            function typeNextLine() {
                if (lineIndex < bootLines.length) {
                    const line = document.createElement('div');
                    line.textContent = '> ' + bootLines[lineIndex];
                    bootText.appendChild(line);
                    lineIndex++;
                    setTimeout(typeNextLine, 150 + Math.random() * 150); 
                } else {
                    setTimeout(() => {
                        bootOverlay.style.opacity = '0';
                        bootOverlay.style.pointerEvents = 'none';
                        document.body.style.overflow = ''; 
                        setTimeout(() => bootOverlay.remove(), 800);
                    }, 400);
                }
            }
            setTimeout(typeNextLine, 200);
        }

        window.addEventListener('DOMContentLoaded', () => {
            fetchDatabase().then(() => {
                runBootSequence(); 
                renderApps();
            });
        });

    </script>
</body>
